services:
  kastabola-web:
    image: agungtrue/kastabola_web:local
    container_name: kastabola_web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=local
      - PORT=3006
      - HOSTNAME=0.0.0.0
    # - NEXT_PUBLIC_API_URL=https://api.domainanda.com

  nginx:
    image: nginx:alpine
    container_name: kastabola_nginx_local
    restart: always
    ports:
      - "80:80"   # HTTP
      # - "443:443" # HTTPS
    volumes:
      # 1. Mount config nginx dari folder project ke dalam container
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf
      # 2. Mount sertifikat SSL dari Host (agar tidak perlu generate ulang dulu)
      # Pastikan path ini sesuai dengan letak sertifikat Certbot di VPS kamu
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - kastabola-web